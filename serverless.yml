service: applyindia-backend
frameworkVersion: "3"
useDotenv: true

custom:
  corsOrigins:
    dev:
      - http://localhost:5173
      - https://dev.applyindia.online
    prod:
      - https://applyindia.online

package:
  patterns:
    - dist/**
    - node_modules/**
    - '!src/**'
    - '!.git/**'
    - '!*.md'

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1
  stage: ${opt:stage, 'dev'}

  deploymentBucket:
    name: applyindia-${self:provider.stage}-serverless-deployments-ap-south-1 

  ################################
  # ✅ ENVIRONMENT VARIABLES
  ################################
  environment:
    APP_ENV: ${self:provider.stage}
    RUNTIME_ENV: lambda
    DYNAMODB_TABLE_NAME: ${env:DYNAMODB_TABLE_NAME}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    COGNITO_DOMAIN: ${env:COGNITO_DOMAIN}
    GOOGLE_CALLBACK_URL: ${env:GOOGLE_CALLBACK_URL}
    FRONTEND_URL: ${env:FRONTEND_URL}

  ################################
  # ✅ IAM PERMISSIONS
  ################################
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/ApplyIndia-${self:provider.stage}
            - arn:aws:dynamodb:${self:provider.region}:*:table/ApplyIndia-${self:provider.stage}/index/*

  ################################
  # ✅ HTTP API + CORS + COGNITO
  ################################
  httpApi:
    cors:
      allowedOrigins: ${self:custom.corsOrigins.${self:provider.stage}}
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true   # ✅ CORRECT for Bearer tokens

    # authorizers:
    #   cognitoJwtAuthorizer:
    #     type: jwt
    #     identitySource: $request.header.Authorization
    #     issuerUrl: https://cognito-idp.${self:provider.region}.amazonaws.com/${env:COGNITO_USER_POOL_ID}
    #     audience:
    #       - ${env:COGNITO_CLIENT_ID}

################################
# ✅ FUNCTIONS
################################
functions:
  public:
    handler: dist/lambda.handler
    events:
      - httpApi:
          path: /public/{proxy+}
          method: ANY

  auth:
    handler: dist/lambda.handler
    events:
      - httpApi:
          path: /auth/{proxy+}
          method: ANY

  private:
    handler: dist/lambda.handler
    events:
      - httpApi:
          path: /api/{proxy+}
          method: ANY

          # authorizer:
          #   name: cognitoJwtAuthorizer

  # ─── Scraper Lambda ────────────────────────────────────────────────────────
  # Triggered by EventBridge every 4 hours.
  # Independently deployable from the Express API.
  scraper:
    handler: dist/scraper/scraperLambda.handler
    timeout: 300      # 5 minutes — scraping multiple sites
    memorySize: 512
    description: "Scheduled scraper for government job, admission, and entrance exam notifications"
    events:
      - schedule:
          rate: rate(4 hours)
          enabled: false # Disabled: Using manual trigger from Admin Dashboard as per user request
          name: applyindia-scraper-${self:provider.stage}
          description: "Triggers the notification scraper every 4 hours (Currently Disabled)"